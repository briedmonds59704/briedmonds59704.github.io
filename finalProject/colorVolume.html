<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Neon Color Volume Control</title>
  <link rel="stylesheet" href="colorVolume.css">
</head>
<body>

  <!-- TOP LEFT VOLUME BAR -->
  <div id="top-bar">
    <div class="volume-display">
      <span>Volume:</span>
      <span id="volume-value">50</span>
    </div>

    <div class="volume-visual-wrapper">
      <div id="volume-visual-bar"></div>
    </div>

    <div class="scheme-wrapper">
      <label for="color-scheme">Hue:</label>
      <select id="color-scheme">
        <option value="0">Red</option>
        <option value="40">Orange</option>
        <option value="120">Green</option>
        <option value="200">Cyan</option>
        <option value="260">Purple</option>
        <option value="300">Magenta</option>
      </select>
    </div>
  </div>

  <!-- MAIN SPLIT SCREEN -->
  <main id="game-layout">

    <!-- LEFT SIDE: HEX GUESS -->
    <section class="panel game-panel">
      <h2>HEX GUESS</h2>
      <p class="subtitle">Match the hex code to the color</p>

      <div class="hex-color-swatch-wrapper">
        <div id="hex-color-swatch" class="hex-color-swatch"></div>
        <div class="hex-target-label">Guess this color's hex</div>
      </div>

      <form id="hex-form">
        <input type="text" id="hex-input" placeholder="#rrggbb" />
        <button type="submit">Submit Guess</button>
      </form>

      <div class="hex-feedback" id="hex-feedback"></div>
    </section>

    <!-- RIGHT SIDE: REVERSE HEX -->
    <section class="panel game-panel">
      <h2>REVERSE HEX</h2>
      <p class="subtitle">Pick the correct color for the hex</p>

      <div class="reverse-hex-target">
        Hex Code: <span id="reverse-hex-code">#000000</span>
      </div>

      <div id="reverse-hex-options" class="reverse-hex-options"></div>
      <div id="reverse-hex-feedback" class="hex-feedback"></div>
    </section>

  </main>

  <!-- SUBMIT BUTTON -->
  <footer>
    <div class="submit-volume-wrapper">
      <button id="final-submit-button">Submit Volume</button>
    </div>
  </footer>

  <script src="colorVolume.js"></script>
</body>
</html>
